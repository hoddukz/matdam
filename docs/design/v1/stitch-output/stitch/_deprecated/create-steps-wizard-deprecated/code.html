<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MatDam - Create Recipe: Cooking Steps</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&amp;family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style type="text/tailwindcss">
        :root {
            --bg-color: #FAF6EF;
            --text-main: #2C2417;
            --text-secondary: #6B5B3E;
            --accent-color: #D4A035;
            --border-color: #E6DCCD;
            --card-bg: #FFFFFF;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Noto Serif KR', serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .step-input-area {
            min-height: 120px;
            resize: none;
        }
        .step-input-area:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 1px var(--accent-color);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
<header class="bg-[var(--card-bg)] border-b border-[var(--border-color)] sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
<div class="flex items-center gap-2 cursor-pointer">
<span class="material-symbols-outlined text-[var(--accent-color)] text-3xl">rice_bowl</span>
<span class="text-xl font-bold font-serif tracking-tight text-[var(--text-main)]">MatDam</span>
</div>
<div class="flex items-center gap-4">
<button class="px-4 py-2 text-[var(--text-secondary)] hover:text-[var(--text-main)] font-medium text-sm">Save Draft</button>
<button class="w-8 h-8 rounded-full bg-gray-200 overflow-hidden border border-gray-300">
<img alt="User Avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBh_FQcTbiJyvjmBocDnki6Q2ZZPzZAcSVLLWsMfjlx5MMAzYBghyodXpUqKRjl2pOafHXfRnazHxKAg9lRXGlWL-RPFzwfdwpKnpYEH31BZjRY0X0wX-FXGaUfWeQGSKDQWoDbe3uQWqVXDbSHkNeDpvBogbzaQyDHbaneiU7iOzNDLaQ-6fN1LgS7JqU8jBElHMj9AQOT4Kc_LeMQWgxPRB9vqOwPNpqhgvwAa1aCj-JoSYwPBVLczoNzakfaAjCfKmOMq_qofQ"/>
</button>
</div>
</div>
</header>
<main class="flex-grow w-full max-w-4xl mx-auto px-6 py-10 flex flex-col items-center">
<div class="w-full max-w-2xl mb-12">
<div class="relative flex items-center justify-between">
<div class="absolute top-1/2 left-0 w-full h-0.5 bg-[var(--border-color)] -z-10 transform -translate-y-1/2"></div>
<div class="flex flex-col items-center gap-2 bg-[var(--bg-color)] px-2">
<div class="w-8 h-8 rounded-full border-2 border-[var(--accent-color)] bg-[var(--card-bg)] flex items-center justify-center text-[var(--accent-color)]">
<span class="material-symbols-outlined text-lg">check</span>
</div>
<span class="text-xs font-medium text-[var(--accent-color)]">Basic</span>
</div>
<div class="flex flex-col items-center gap-2 bg-[var(--bg-color)] px-2">
<div class="w-8 h-8 rounded-full border-2 border-[var(--accent-color)] bg-[var(--card-bg)] flex items-center justify-center text-[var(--accent-color)]">
<span class="material-symbols-outlined text-lg">check</span>
</div>
<span class="text-xs font-medium text-[var(--accent-color)]">Ingredients</span>
</div>
<div class="flex flex-col items-center gap-2 bg-[var(--bg-color)] px-2">
<div class="w-8 h-8 rounded-full bg-[var(--accent-color)] flex items-center justify-center text-white shadow-lg shadow-orange-100">
<span class="text-sm font-bold">3</span>
</div>
<span class="text-xs font-bold text-[var(--text-main)]">Steps</span>
</div>
<div class="flex flex-col items-center gap-2 bg-[var(--bg-color)] px-2">
<div class="w-8 h-8 rounded-full border-2 border-[var(--border-color)] bg-[var(--card-bg)] flex items-center justify-center text-[var(--border-color)]">
<span class="text-sm font-bold">4</span>
</div>
<span class="text-xs font-medium text-[var(--text-secondary)]">Preview</span>
</div>
</div>
</div>
<div class="text-center mb-8">
<h1 class="text-3xl font-bold text-[var(--text-main)] mb-2">How do you make it?</h1>
<p class="text-[var(--text-secondary)]">Break down your recipe into simple, easy-to-follow steps.</p>
</div>
<div class="w-full max-w-2xl flex flex-col gap-6 relative">
<div class="bg-[var(--card-bg)] rounded-2xl border border-[var(--border-color)] shadow-sm p-6 md:p-8 transform transition-all hover:shadow-md ring-1 ring-black/5">
<div class="flex justify-between items-start mb-4">
<h3 class="text-lg font-bold text-[var(--text-main)] font-serif">Step 1</h3>
<button class="text-[var(--text-secondary)] hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
<div class="flex flex-col md:flex-row gap-6">
<div class="flex-1 flex flex-col">
<textarea class="step-input-area w-full bg-[var(--bg-color)] rounded-xl border border-[var(--border-color)] p-4 text-[var(--text-main)] placeholder-[var(--text-secondary)] text-lg leading-relaxed transition-all mb-4" placeholder="Explain this step... (e.g., 'Thinly slice the kimchi and onions into bite-sized pieces.')"></textarea>
<div class="flex flex-wrap items-center gap-3 mt-auto">
<button class="flex items-center gap-2 px-3 py-2 rounded-lg bg-gray-50 border border-gray-200 text-sm font-medium text-[var(--text-secondary)] hover:bg-gray-100 transition-colors">
<span class="material-symbols-outlined text-lg">add_a_photo</span>
                                Add Photo
                            </button>
<button class="flex items-center gap-2 px-3 py-2 rounded-lg bg-gray-50 border border-gray-200 text-sm font-medium text-[var(--text-secondary)] hover:bg-gray-100 transition-colors">
<span class="material-symbols-outlined text-lg">timer</span>
                                Set Timer
                            </button>
<div class="relative group">
<button class="flex items-center gap-2 px-3 py-2 rounded-lg bg-gray-50 border border-gray-200 text-sm font-medium text-[var(--text-secondary)] hover:bg-gray-100 transition-colors">
<span class="material-symbols-outlined text-lg">grocery</span>
                                    Link Ingredient
                                    <span class="material-symbols-outlined text-sm">expand_more</span>
</button>
<div class="absolute bottom-full left-0 mb-2 w-48 bg-white rounded-lg shadow-lg border border-gray-100 hidden group-hover:block z-10 py-1">
<div class="px-3 py-2 text-xs font-bold text-gray-400 uppercase tracking-wider">Select Ingredient</div>
<a class="block px-4 py-2 text-sm text-[var(--text-main)] hover:bg-orange-50" href="#">Kimchi</a>
<a class="block px-4 py-2 text-sm text-[var(--text-main)] hover:bg-orange-50" href="#">Onion</a>
<a class="block px-4 py-2 text-sm text-[var(--text-main)] hover:bg-orange-50" href="#">Pork Belly</a>
</div>
</div>
</div>
<div class="mt-4 flex flex-wrap gap-2">
</div>
</div>
<div class="w-full md:w-1/3 shrink-0">
<label class="block w-full aspect-[4/3] rounded-xl border-2 border-dashed border-[var(--border-color)] hover:border-[var(--accent-color)] hover:bg-orange-50/50 cursor-pointer transition-all flex flex-col items-center justify-center text-[var(--text-secondary)] bg-[var(--bg-color)]">
<span class="material-symbols-outlined text-3xl mb-1">image</span>
<span class="text-xs font-medium">Add Photo</span>
<input accept="image/*" class="hidden" type="file"/>
</label>
</div>
</div>
</div>
<div class="bg-[var(--card-bg)] rounded-xl border border-[var(--border-color)] border-dashed p-6 opacity-60 hover:opacity-100 transition-all cursor-pointer group">
<div class="flex items-center justify-between mb-2">
<h3 class="text-lg font-bold text-[var(--text-secondary)] font-serif group-hover:text-[var(--text-main)]">Step 2</h3>
<span class="material-symbols-outlined text-[var(--text-secondary)] opacity-0 group-hover:opacity-100 transition-opacity">edit</span>
</div>
<div class="h-12 w-full bg-[var(--bg-color)] rounded-lg mb-3"></div>
<div class="flex gap-2">
<div class="h-8 w-20 bg-[var(--bg-color)] rounded-md"></div>
<div class="h-8 w-20 bg-[var(--bg-color)] rounded-md"></div>
</div>
</div>
<div class="text-center mt-4 mb-8">
<p class="text-sm text-[var(--text-secondary)] bg-white/50 inline-flex items-center gap-2 px-4 py-2 rounded-full border border-[var(--border-color)]">
<span class="material-symbols-outlined text-base">keyboard_return</span>
                    Tip: Press <span class="font-bold text-[var(--text-main)]">Enter</span> twice to start the next step.
                </p>
</div>
</div>
<div class="w-full max-w-2xl mt-auto pt-6 border-t border-[var(--border-color)] flex justify-between items-center">
<button class="px-6 py-3 rounded-xl text-[var(--text-secondary)] font-medium hover:bg-[var(--border-color)]/20 transition-colors flex items-center gap-2">
<span class="material-symbols-outlined">arrow_back</span>
                Back
            </button>
<button class="px-8 py-3 rounded-xl bg-[var(--text-main)] text-white font-medium hover:bg-black transition-colors shadow-lg shadow-gray-200 flex items-center gap-2">
                Finish &amp; Preview
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>

</body></html>
